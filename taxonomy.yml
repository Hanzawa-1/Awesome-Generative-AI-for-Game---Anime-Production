# Area -> Task taxonomy for "Awesome Generative AI for Game & Anime Production".
#
# This file is the SINGLE SOURCE OF TRUTH for the catalog structure. Schema validation,
# the generated nav, and every catalog page derive from it. To add/rename/remove a task,
# edit here and run `make validate` (existing entries referencing a removed task will fail
# validation, which is intentional — fix or remigrate them).
#
# Each task: id (slug, stable), name (display), optional desc, optional keywords (steer the
# agent's search + improve site search). Area ids and task ids must be unique.

areas:
  - id: image-2d
    name: "Image & 2D Art"
    description: "Concept art, 2D illustration, and image-space generation/editing."
    tasks:
      - { id: text-to-image,          name: "Text-to-Image",                 keywords: [diffusion, sdxl, flux] }
      - { id: image-editing,          name: "Image Editing & Inpainting",    keywords: [inpainting, outpainting] }
      - { id: style-transfer-lora,    name: "Style Transfer / LoRA",         keywords: [lora, fine-tuning, style] }
      - { id: controlnet,             name: "ControlNet-style Conditioning",  keywords: [controlnet, conditioning, pose, depth] }
      - { id: sketch-to-image,        name: "Sketch-to-Image",               keywords: [scribble, sketch] }
      - { id: super-resolution,       name: "Super-Resolution & Upscaling",  keywords: [waifu2x, real-esrgan, real-cugan, upscaling] }
      - { id: anime-character-design, name: "Anime Character Design",        keywords: [anime, character, novelai] }
      - { id: lineart-extraction,     name: "Line-Art Extraction & Cleanup", keywords: [lineart, sketch-simplification] }
      - { id: lineart-colorization,   name: "Line-Art Colorization",         keywords: [colorization, flat-color, reference-color] }
      - { id: cel-shading,            name: "Cel Shading",                   keywords: [toon-shading, shadow] }

  - id: gen-3d
    name: "3D Generation"
    description: "Text/image-to-3D, meshes, textures, scenes, and worlds."
    tasks:
      - { id: text-to-3d,         name: "Text-to-3D",                          keywords: [dreamfusion, score-distillation] }
      - { id: image-to-3d,        name: "Image-to-3D",                         keywords: [single-view, multi-view, reconstruction] }
      - { id: mesh-generation,    name: "Mesh Generation",                     keywords: [mesh, gaussian-splatting, nerf] }
      - { id: texture-pbr,        name: "Texture / PBR / Material Generation", keywords: [pbr, texture, material] }
      - { id: normal-depth-maps,  name: "Normal & Depth Map Generation",       keywords: [normal-map, depth, midas] }
      - { id: uv-retopology,      name: "UV Unwrap & Retopology",              keywords: [uv, retopology, lod] }
      - { id: scene-generation,   name: "3D Scene / Environment Generation",   keywords: [scene, environment] }
      - { id: terrain-world,      name: "Terrain / World Generation",          keywords: [terrain, world, procedural] }
      - { id: skybox-panorama,    name: "360° Skybox / Panorama",              keywords: [skybox, panorama, 360] }

  - id: characters
    name: "Characters & Avatars"
    description: "Digital humans, stylized characters, rigging, and skinning."
    tasks:
      - { id: character-generation, name: "Character Generation",     keywords: [character, full-body] }
      - { id: face-head-3d,         name: "3D Face / Head",           keywords: [face, head, expression] }
      - { id: avatar-generation,    name: "Avatar Generation",        keywords: [avatar, metahuman] }
      - { id: auto-rigging,         name: "Auto-Rigging",             keywords: [rigging, skeleton, mixamo, cascadeur] }
      - { id: skinning,             name: "Skinning / Weight Painting", keywords: [skinning, weights, deformation] }

  - id: animation
    name: "Animation & Motion"
    description: "Motion synthesis, capture, retargeting, and 2D inbetweening."
    tasks:
      - { id: text-to-motion,        name: "Text-to-Motion",                       keywords: [motion-generation, text-to-motion] }
      - { id: video-mocap,           name: "Video Motion Capture",                 keywords: [mocap, pose-estimation, deepmotion] }
      - { id: motion-retargeting,    name: "Motion Retargeting",                   keywords: [retargeting, transfer] }
      - { id: physics-animation,     name: "Physics-Based Animation",              keywords: [physics, ragdoll] }
      - { id: facial-lipsync,        name: "Facial Animation & Lip-Sync",          keywords: [lip-sync, facial, audio-driven] }
      - { id: inbetweening,          name: "Frame Interpolation / Inbetweening",   keywords: [rife, tooncrafter, animeinterp, interpolation] }
      - { id: pose-to-frame,         name: "Pose-to-Frame",                        keywords: [pose-guided, animate-anyone] }
      - { id: procedural-animation,  name: "Procedural Animation / Behavior",      keywords: [procedural, behavior, rl] }

  - id: video
    name: "Video"
    description: "Video generation, style transfer, restoration, and segmentation."
    tasks:
      - { id: text-to-video,         name: "Text-to-Video",                        keywords: [text-to-video, t2v] }
      - { id: image-to-video,        name: "Image-to-Video",                       keywords: [image-to-video, animate-still] }
      - { id: video-style-transfer,  name: "Video Style Transfer",                 keywords: [style-transfer, photo-to-anime] }
      - { id: video-sr-restoration,  name: "Video Super-Resolution & Restoration", keywords: [restoration, remaster, denoise] }
      - { id: rotoscoping,           name: "Rotoscoping / Video Segmentation & Matting", keywords: [sam2, matting, segmentation] }
      - { id: video-editing,         name: "Video Editing",                        keywords: [editing, inpaint-video] }

  - id: audio
    name: "Audio"
    description: "Speech, voice, singing, music, and sound effects."
    tasks:
      - { id: tts,               name: "Text-to-Speech",                  keywords: [tts, speech-synthesis] }
      - { id: voice-cloning,     name: "Voice Cloning & Conversion",      keywords: [voice-cloning, voice-conversion, dubbing] }
      - { id: singing-voice,     name: "Singing Voice Synthesis",         keywords: [vocaloid, synthesizer-v, svs] }
      - { id: music-bgm,         name: "Music & Adaptive BGM Generation", keywords: [music-generation, bgm, soundtrack] }
      - { id: sfx-foley,         name: "Sound Effects / Foley",           keywords: [sfx, foley, sound-generation] }
      - { id: procedural-audio,  name: "Procedural / Interactive Audio",  keywords: [procedural-audio, metasounds, fmod] }

  - id: text-design
    name: "Text, Narrative & Design"
    description: "Dialogue, narrative, procedural content, and localization."
    tasks:
      - { id: npc-dialogue,    name: "NPC Dialogue Generation",       keywords: [npc, dialogue, inworld] }
      - { id: narrative-quest, name: "Narrative / Quest Generation",  keywords: [narrative, quest, story] }
      - { id: pcg,             name: "Procedural Content Generation", keywords: [pcg, level-generation, pcgml] }
      - { id: localization,    name: "Localization & Translation",    keywords: [localization, translation, whisper] }

  - id: manga
    name: "Manga & Comics"
    description: "Manga page generation, layout, colorization, and lettering."
    tasks:
      - { id: manga-generation,   name: "Manga Panel / Page Generation", keywords: [manga, panel, page] }
      - { id: panel-layout,       name: "Panel Layout & Composition",    keywords: [layout, panel, storyboard] }
      - { id: manga-colorization, name: "Manga Colorization",            keywords: [manga-colorization, screentone-color] }
      - { id: screentone,         name: "Screentone",                    keywords: [screentone, halftone] }
      - { id: manga-translation,  name: "Translation & Lettering",       keywords: [translation, lettering, ocr] }
