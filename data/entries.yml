  title: AnimateAnyMesh
  area: animation
  task: text-to-motion
  kind: oss
  links:
    github: https://github.com/JarrentWu1031/AnimateAnyMesh
  year: 2025
  tags:
  - 4d
  - mesh-animation
  - text-driven
  summary: Animates arbitrary 3D meshes from text prompts, generating 4D mesh motion (per-vertex deformation over time) for fast dynamic-asset creation.
