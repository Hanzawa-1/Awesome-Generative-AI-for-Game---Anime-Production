  title: 'SAFT: Shape and Appearance of Fabrics from Template'
  area: animation
  task: physics-animation
  kind: oss
  links:
    github: https://github.com/vc-bonn/saft
  year: 2025
  tags:
  - cloth
  - differentiable
  - simulation
  summary: Recovers the shape and appearance of fabrics from a template via differentiable physical simulation on monocular video, yielding physically-grounded cloth assets.
  summary_ja: 単眼動画上の微分可能な物理シミュレーションを通じて、テンプレートから布の形状と外観を復元し、物理的に妥当な布アセットを得る。
