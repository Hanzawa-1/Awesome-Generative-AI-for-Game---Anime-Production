  summary: Predicts physical material properties from visual input ('physics from pixels') so that generated 3D scenes can be simulated with realistic dynamics.
  summary_ja: 視覚入力から物理的なマテリアル特性を予測する「ピクセルからの物理」。生成された3Dシーンを現実的な力学でシミュレーションできるようにする。
